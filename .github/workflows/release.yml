name: Release

# Publish to npm via OIDC Trusted Publishing when a version tag is pushed (e.g. v0.1.0).
# No NPM_TOKEN secret — auth is a short-lived OIDC token verified against the
# package's trusted-publisher config on npmjs.com.
on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # mint the OIDC token for trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Upgrade npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install
        run: npm install
      - name: Publish (OIDC trusted publishing)
        run: npm publish --access public --provenance
